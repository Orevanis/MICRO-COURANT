# Mosquitto MQTT Broker Configuration

# Listener settings
listener 1883
protocol mqtt
allow_anonymous true

# WebSocket support
listener 9001
protocol websockets
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data
autosave_interval 1800

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Security (for production, disable anonymous access)
# listener 1883
# protocol mqtt
# allow_anonymous false
# password_file /mosquitto/config/passwd
