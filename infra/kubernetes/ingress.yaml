apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: micro-courant-ingress
  namespace: micro-courant
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.micro-courant.org
    secretName: api-tls
  - hosts:
    - household.micro-courant.org
    secretName: household-tls
  - hosts:
    - operator.micro-courant.org
    secretName: operator-tls
  - hosts:
    - governance.micro-courant.org
    secretName: governance-tls
  rules:
  - host: api.micro-courant.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 80
  - host: household.micro-courant.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: household-dashboard-service
            port:
              number: 80
  - host: operator.micro-courant.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: operator-dashboard-service
            port:
              number: 80
  - host: governance.micro-courant.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: governance-dashboard-service
            port:
              number: 80
