apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: micro-courant
data:
  NODE_ENV: "production"
  PORT: "3000"
  RATE_LIMIT_WINDOW: "900000"
  RATE_LIMIT_MAX: "100"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telemetry-config
  namespace: micro-courant
data:
  NODE_ENV: "production"
  PORT: "3001"
  LOG_LEVEL: "info"
  QUEUE_CONCURRENCY: "10"
  QUEUE_MAX_RETRIES: "3"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-config
  namespace: micro-courant
data:
  NODE_ENV: "production"
  PORT: "3002"
  LOG_LEVEL: "info"
