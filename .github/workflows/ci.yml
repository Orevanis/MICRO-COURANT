name: Micro-Courant CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  RUST_VERSION: '1.70.0'
  NODE_VERSION: '18.0.0'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rust-version: ${{ env.RUST_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install
          npm run install:all

      - name: Lint Rust contracts
        run: |
          cd contracts
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Lint JavaScript/TypeScript
        run: npm run lint

      - name: Check formatting
        run: npm run format -- --check

  test-contracts:
    name: Test Soroban Contracts
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rust-version: ${{ env.RUST_VERSION }}

      - name: Install Soroban CLI
        run: |
          cargo install soroban-cli --locked

      - name: Run contract tests
        run: |
          cd contracts
          cargo test --all

      - name: Build contracts
        run: |
          cd contracts
          cargo build --release

  test-backend:
    name: Test Backend Services
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: micro_courant_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install
          npm run install:backend

      - name: Run backend tests
        run: npm run test:backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: micro_courant_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  test-frontend:
    name: Test Frontend Applications
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install
          npm run install:frontend

      - name: Run frontend tests
        run: npm run test:frontend

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-contracts, test-backend]
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: micro_courant_integration
          POSTGRES_USER: integration_user
          POSTGRES_PASSWORD: integration_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      mosquitto:
        image: eclipse-mosquitto:2.0
        ports:
          - 1883:1883

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rust-version: ${{ env.RUST_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Soroban CLI
        run: cargo install soroban-cli --locked

      - name: Install dependencies
        run: |
          npm install
          npm run install:all

      - name: Build contracts
        run: npm run build:contracts

      - name: Run integration tests
        run: |
          # Run end-to-end energy lifecycle simulation
          # Run high-frequency meter ingestion tests
          # Run billing accuracy validation
          # Run P2P trading validation
          # Run governance voting simulation
          echo "Running integration tests..."
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: micro_courant_integration
          POSTGRES_USER: integration_user
          POSTGRES_PASSWORD: integration_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MQTT_BROKER: localhost
          MQTT_PORT: 1883

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Rust security audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run npm audit
        run: npm audit --audit-level=moderate

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-contracts, test-backend, test-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build telemetry service
        run: docker build -t micro-courant/telemetry:latest ./backend/telemetry

      - name: Build API gateway
        run: docker build -t micro-courant/api-gateway:latest ./backend/api-gateway

      - name: Build billing engine
        run: docker build -t micro-courant/billing-engine:latest ./backend/billing-engine

      - name: Build household dashboard
        run: docker build -t micro-courant/household-dashboard:latest ./frontend/household-dashboard

      - name: Build operator dashboard
        run: docker build -t micro-courant/operator-dashboard:latest ./frontend/operator-dashboard

      - name: Build governance dashboard
        run: docker build -t micro-courant/governance-dashboard:latest ./frontend/governance-dashboard

  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan, build-docker]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Soroban contracts to testnet
        run: |
          # Deploy contracts to Soroban testnet
          echo "Deploying contracts to testnet..."
        env:
          SOROBAN_RPC_URL: ${{ secrets.SOROBAN_TESTNET_RPC }}
          SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_TESTNET_SECRET }}

      - name: Deploy services to testnet
        run: |
          # Deploy backend services to testnet environment
          echo "Deploying services to testnet..."

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan, build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Soroban contracts to production
        run: |
          # Deploy contracts to Soroban mainnet
          echo "Deploying contracts to production..."
        env:
          SOROBAN_RPC_URL: ${{ secrets.SOROBAN_MAINNET_RPC }}
          SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_MAINNET_SECRET }}

      - name: Deploy services to production
        run: |
          # Deploy backend services to production
          echo "Deploying services to production..."
